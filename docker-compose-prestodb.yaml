services:
  presto-coordinator:
    image: prestodb/presto:latest
    container_name: presto-coordinator
    hostname: presto-coordinator
    ports:
      - "8081:8080" # UI Presto diakses via localhost:8081
    volumes:
      # Mapping config khusus coordinator
      - ./presto-etc/node.properties:/opt/presto-server/etc/node.properties
      - ./presto-etc/jvm.config:/opt/presto-server/etc/jvm.config
      - ./presto-etc/config.properties.coordinator:/opt/presto-server/etc/config.properties
      # Folder catalog bersama
      - ./presto-etc/catalog:/opt/presto-server/etc/catalog
    networks:
      data_net:
        ipv4_address: 172.20.80.50

  presto-worker-1:
    image: prestodb/presto:latest
    container_name: presto-worker-1
    hostname: presto-worker-1
    volumes:
      # Mapping config khusus worker
      - ./presto-etc/node.properties:/opt/presto-server/etc/node.properties
      - ./presto-etc/jvm.config:/opt/presto-server/etc/jvm.config
      - ./presto-etc/config.properties.worker:/opt/presto-server/etc/config.properties
      # Folder catalog bersama
      - ./presto-etc/catalog:/opt/presto-server/etc/catalog
    depends_on:
      - presto-coordinator
    networks:
      data_net:
        ipv4_address: 172.20.80.51

networks:
  data_net:
    external: true
