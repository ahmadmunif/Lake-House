services:
  polaris-db:
    image: postgres:16
    container_name: polaris-db
    environment:
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
      POSTGRES_DB: polaris_db
    networks:
      data_net:
        ipv4_address: 172.20.80.60
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris_user -d polaris_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  polaris:
    image: apache/polaris:1.2.0-incubating
    container_name: polaris-server
    hostname: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    depends_on:
      polaris-db:
        condition: service_healthy

    environment:
      - POLARIS_PERSISTENCE_TYPE=relational-jdbc
      - POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES=5
      - POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS=100
      - POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS=5000
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://polaris-db:5432/polaris_db
      - QUARKUS_DATASOURCE_USERNAME=polaris_user
      - QUARKUS_DATASOURCE_PASSWORD=polaris_password

      # Realm & Auth
      - POLARIS_REALM_CONTEXT_REALMS=default-realm
      - POLARIS_BOOTSTRAP_CREDENTIALS=default-realm,polaris,a1b2c3d4e5f67890a1b2c3d4e5f67890

      # Features (Format yang diterima Quarkus tanpa error SRCFG)
      - POLARIS_FEATURES_ALLOW_INSECURE_STORAGE_TYPES=true
      - POLARIS_FEATURES_SUPPORTED_CATALOG_STORAGE_TYPES=FILE,S3
      - POLARIS_FEATURES_STORAGE_CREDENTIAL_VENDING_ALLOWED=false
      - POLARIS_READINESS_IGNORE_SEVERE_ISSUES=true
      - QUARKUS_OTEL_SDK_DISABLED=true

      # S3 / MinIO Configuration (KUNCI AGAR TIDAK ERROR STS)
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
      # Paksa semua traffic AWS SDK ke IP MinIO kamu
      - AWS_ENDPOINT_URL=http://172.20.80.10:9000
      - AWS_ENDPOINT_URL_S3=http://172.20.80.10:9000
    networks:
      data_net:
        ipv4_address: 172.20.80.61
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 10s
      retries: 5


networks:
  data_net:
    external: true
