services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # API Port
      - "9001:9001"    # Web UI Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./minio-data:/data
    networks:
      data_net:
        ipv4_address: 172.20.80.10
    command: server /data --console-address ":9001"

networks:
  data_net:
    external: true
