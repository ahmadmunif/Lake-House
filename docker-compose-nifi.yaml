services:
  nifi:
    image: apache/nifi:latest
    container_name: nifi
    restart: unless-stopped
    ports:
      - "8443:8443"  # Default HTTPS port NiFi (sejak ver 1.14+)
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      # Auth wajib di set (jika tidak, dia generate password acak di log)
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      # Password MINIMAL 12 karakter (aturan default NiFi)
      - SINGLE_USER_CREDENTIALS_PASSWORD=password123456 
      - TZ=Asia/Jakarta
      - NIFI_JVM_HEAP_INIT=2g    # Nilai awal (Xms)
      - NIFI_JVM_HEAP_MAX=4g     # Nilai maksimal (Xmx)
    volumes:
      # Mapping agar Flow/Code tidak hilang saat container restart
      #- ./nifi-data/conf:/opt/nifi/nifi-current/conf
      - ./nifi-data/extensions:/opt/nifi/nifi-current/extensions
      - ./nifi-data/database_repository:/opt/nifi/nifi-current/database_repository
      - ./nifi-data/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi-data/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi-data/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./nifi-data/state:/opt/nifi/nifi-current/state
      - ./nifi-data/logs:/opt/nifi/nifi-current/logs
    networks:
      data_net:
        ipv4_address: 172.20.80.15

networks:
  data_net:
    external: true
